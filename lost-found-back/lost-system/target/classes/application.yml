spring:
  application:
    name: dormitory-repair-system
  #配置数据库连接信息
  datasource:
    url: jdbc:mysql://localhost:3306/lost_system
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1225
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB
      enabled: true

#Mybatis相关配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true